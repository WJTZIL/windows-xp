<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows XP Themed Page</title>
    <style>
        body {
            background: linear-gradient(to bottom, #0078D7, #A6C8FF);
            font-family: 'Segoe UI', Tahoma, Geneva, sans-serif;
            color: #000;
            margin: 0;
        }
        .desktop {
            position: relative;
            height: 80vh;
            border: 1px solid #5B88C8;
            border-radius: 8px;
            padding: 20px;
            background: #C0C0C0;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .window {
            width: 300px;
            height: 200px;
            border: 2px solid #4A8BC2;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            background: #DCDCDC;
            position: absolute;
            top: 50px;
            left: 20px;
        }
        .title-bar {
            background: #4A8BC2;
            padding: 5px;
            color: white;
            font-weight: bold;
            text-align: center;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }
        .menu-bar {
            background: #DFDFDF;
            border-bottom: 1px solid #A6A6A6;
            padding: 5px;
        }
        .taskbar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: #C0C0C0;
            border-top: 1px solid #A6A6A6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
        }
        .start-button {
            background: #0078D7;
            color: white;
            border: none;
            border-radius: 3px;
            padding: 5px 10px;
            cursor: pointer;
        }
        .system-tray {
            display: flex;
            gap: 10px;
        }
        .icon {
            width: 48px;
            height: 48px;
            background: #FFFFFF;
            border: 1px solid #A6A6A6;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="desktop">
        <div class="window">
            <div class="title-bar">Sample Window</div>
            <div class="menu-bar">Menu</div>
        </div>
        <div class="icon">My Computer</div>
        <div class="icon">Recycle Bin</div>
    </div>
    <div class="taskbar">
        <button class="start-button">Start</button>
        <div class="system-tray">
            <div>Network</div>
            <div>Volume</div>
            <div>Battery</div>
        </div>
    </div>
</body>
</html>
